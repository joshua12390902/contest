experiment:
  name: cross_scene_train4_test5
  seed: 42

paths:
  preprocessed_root: data/preprocessed_actions
  manifest: data/preprocessed_actions/manifest.json
  weights_dir: weights
  outputs_dir: outputs

model:
  num_keypoints: 25
  num_layers: 4
  num_heads: 8
  pos_enc_depth: 10
  max_seq_len: 120

data:
  batch_size: 2
  num_workers: 4
  amp: true

train:
  epochs: 200
  lr: 1.0e-4
  weight_decay: 0.01
  grad_accum: 8
  val_ratio: 0.1

protocol:
  type: cross_scene
  train_scenes: [Scene4]
  test_scene: Scene5
  # CAVEAT: Scene4 and Scene5 were each self-calibrated INDEPENDENTLY, so their
  # world frames are not co-registered (scene_matrix=I in both). Absolute MPJPE
  # across the two frames is therefore NOT directly meaningful — use this split to
  # study the *relative* effect of geometry conditioning (rel_rx on/off), not as a
  # paper-comparable cross-scene number.
